<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Punting Club — The Ultimate Sports Betting League</title>
    <meta name="description" content="Form a team, place weekly bets, and compete with friends across 8, 16, or 32-week seasons. AI-powered bet tracking, live leaderboards, and real jackpots." />
    <meta name="theme-color" content="#030712" />

    <!-- Open Graph -->
    <meta property="og:title" content="Punting Club — The Ultimate Sports Betting League" />
    <meta property="og:description" content="Form a team, place weekly bets, and compete with friends. AI-powered tracking, live leaderboards, real jackpots." />
    <meta property="og:type" content="website" />

    <!-- Favicon (SVG emoji) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; background: #030712; font-family: 'Inter', sans-serif; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #111; }
      ::-webkit-scrollbar-thumb { background: #f59e0b55; border-radius: 3px; }

      /* ── Keyframes ──────────────────────────────────────────────────────── */
      @keyframes ticker {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.94) translateY(10px); }
        to   { opacity: 1; transform: scale(1)    translateY(0); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes floatHint {
        0%, 100% { transform: translateX(-50%) translateY(0); }
        50%       { transform: translateX(-50%) translateY(-5px); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      /* ── Animation classes ──────────────────────────────────────────────── */
      .bc-ticker {
        animation: ticker 30s linear infinite;
        display: inline-block;
        will-change: transform;
      }
      .bc-fadeup {
        animation: fadeUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
        will-change: opacity, transform;
      }
      /* Modal content entrance — scale + fade */
      .bc-modal {
        animation: scaleIn 0.22s cubic-bezier(0.16, 1, 0.3, 1) both;
        will-change: opacity, transform;
      }
      /* Modal backdrop — fade in */
      .bc-backdrop {
        animation: fadeIn 0.18s ease both;
      }
      /* Toast slide-up entrance */
      .bc-toast {
        animation: slideUp 0.22s cubic-bezier(0.16, 1, 0.3, 1) both;
        will-change: opacity, transform;
      }
      /* Landscape hint — gentle float (fixes translateX conflict with animate-bounce) */
      .bc-landscape-hint {
        animation: floatHint 2.2s ease-in-out infinite;
        will-change: transform;
      }

      /* ── Reduced motion ─────────────────────────────────────────────────── */
      @media (prefers-reduced-motion: reduce) {
        .bc-ticker        { animation: none; }
        .bc-fadeup        { animation: none; opacity: 1; transform: none; }
        .bc-modal         { animation: none; opacity: 1; transform: none; }
        .bc-backdrop      { animation: none; opacity: 1; }
        .bc-toast         { animation: none; opacity: 1; transform: none; }
        .bc-landscape-hint{ animation: none; }
        *, *::before, *::after { transition-duration: 0.01ms !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
